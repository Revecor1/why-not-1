<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Почему Нет?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: { 50: '#fcfaf8', 100: '#f5f0e8', 200: '#e8dbce', 300: '#d7c0ae', 400: '#c29d84', 500: '#ab7e60', 600: '#946247', 700: '#7a4e3a', 800: '#6b4e3d', 900: '#3e2a21', 950: '#1a120e' },
                        terracotta: { DEFAULT: '#d9774f', 500: '#d9774f', 600: '#c5613a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-coffee-50 text-coffee-900 flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="flex-grow py-40 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex flex-col md:flex-row gap-12">
                <!-- Sidebar Info -->
                <div class="md:w-1/3">
                    <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-coffee-100 text-center sticky top-32">
                        <div class="w-32 h-32 bg-terracotta text-white rounded-3xl flex items-center justify-center text-5xl font-bold mx-auto mb-8 shadow-2xl shadow-terracotta/20">
                            <i class="far fa-user"></i>
                        </div>
                        <h2 id="profile-name" class="text-3xl font-serif font-bold text-coffee-900 mb-2">Загрузка...</h2>
                        <p id="profile-email" class="text-coffee-400 mb-8 font-medium">email@example.com</p>
                        
                        <div class="space-y-4 pt-8 border-t border-coffee-50">
                            <button id="logout-btn" class="w-full text-red-500 font-bold hover:bg-red-50 py-4 rounded-2xl transition-all flex items-center justify-center gap-3">
                                <i class="fas fa-power-off"></i> Выйти из аккаунта
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="md:w-2/3 space-y-12">
                    <!-- Orders -->
                    <div class="bg-white p-10 rounded-[4rem] shadow-xl border border-coffee-100">
                        <div class="flex items-center gap-4 mb-10 border-b border-coffee-50 pb-6">
                            <div class="w-12 h-12 bg-coffee-50 rounded-xl flex items-center justify-center text-terracotta">
                                <i class="fas fa-shopping-bag"></i>
                            </div>
                            <h3 class="text-2xl font-serif font-bold">История заказов</h3>
                        </div>
                        <div id="profile-orders" class="space-y-6">
                            <!-- JS -->
                        </div>
                    </div>

                    <!-- Reservations -->
                    <div class="bg-white p-10 rounded-[4rem] shadow-xl border border-coffee-100">
                        <div class="flex items-center gap-4 mb-10 border-b border-coffee-50 pb-6">
                            <div class="w-12 h-12 bg-coffee-50 rounded-xl flex items-center justify-center text-terracotta">
                                <i class="far fa-calendar-check"></i>
                            </div>
                            <h3 class="text-2xl font-serif font-bold">Мои бронирования</h3>
                        </div>
                        <div id="profile-reservations" class="space-y-6">
                            <!-- JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="cart-placeholder"></div>
    <div id="toast-container" class="fixed bottom-6 right-6 flex flex-col gap-3 z-[10000]"></div>
    <div id="footer-placeholder"></div>
    <div id="chat-placeholder"></div>

    <script src="js/api.js"></script><script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
