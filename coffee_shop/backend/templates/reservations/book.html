{% extends 'base.html' %}
{% block title %}Забронировать столик — Почему нет?{% endblock %}
{% block content %}
<div class="container py-lg">
    <div class="text-center">
        <h2>Забронировать столик ☕️🪑</h2>
        <p class="text-muted">Выберите удобное время, и мы подготовим всё к вашему приходу.</p>
    </div>
    
    <div class="card p-lg mt-md mx-auto" style="max-width: 500px;">
        <form method="post">
            {% csrf_token %}
            <div class="form-group mb-md">
                <label for="date">Дата:</label>
                <input type="date" name="date" id="date" class="form-control" required>
            </div>
            <div class="form-group mb-md">
                <label for="time">Время:</label>
                <input type="time" name="time" id="time" class="form-control" required>
            </div>
            <div class="form-group mb-md">
                <label for="people">Количество человек:</label>
                <input type="number" name="people" id="people" class="form-control" value="2" min="1" max="10">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Забронировать</button>
        </form>
    </div>
</div>
{% endblock %}
