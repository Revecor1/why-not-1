<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal | Revecor Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./minimal.css">
</head>
<body>
    <!-- Animated Mesh Background -->
    <div class="mesh-bg">
        <div class="mesh-orb orb-1"></div>
        <div class="mesh-orb orb-2"></div>
        <div class="mesh-orb orb-3"></div>
    </div>

    <main class="minimal-layout">
        <header class="minimal-header fade-in">
            <img src="/logo.jpg" alt="Revecor" class="mini-logo">
            <a href="/" class="home-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
        </header>

        <section class="blocks-grid container">
            <!-- Block 1 -->
            <div class="block fade-in-delay-1">
                <div class="block-visual">
                    <img src="https://images.unsplash.com/photo-1627373100182-09273fe1c26c?auto=format&fit=crop&q=80&w=400" alt="Game">
                </div>
                <div class="block-info">
                    <h3>Spider-Man 2</h3>
                    <p class="price">7 990 ₽</p>
                </div>
                <button class="add-btn">+</button>
            </div>

            <!-- Block 2 -->
            <div class="block fade-in-delay-2">
                <div class="block-visual ps-plus-gradient">
                    <div class="ps-logo">PS+</div>
                    <span>Deluxe</span>
                </div>
                <div class="block-info">
                    <h3>PS Plus Deluxe</h3>
                    <p class="price">11 990 ₽</p>
                </div>
                <button class="add-btn">+</button>
            </div>

            <!-- Block 3 -->
            <div class="block fade-in-delay-3">
                <div class="block-visual">
                    <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?auto=format&fit=crop&q=80&w=400" alt="Game">
                </div>
                <div class="block-info">
                    <h3>God of War</h3>
                    <p class="price">6 990 ₽</p>
                </div>
                <button class="add-btn">+</button>
            </div>

            <!-- Block 4 -->
            <div class="block fade-in-delay-4">
                <div class="block-visual topup-gradient">
                    <div class="card-icon">💳</div>
                    <span>1000 TL</span>
                </div>
                <div class="block-info">
                    <h3>Карта пополнения</h3>
                    <p class="price">3 500 ₽</p>
                </div>
                <button class="add-btn">+</button>
            </div>

            <!-- Block 5 -->
            <div class="block fade-in-delay-5">
                <div class="block-visual">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400" alt="Game">
                </div>
                <div class="block-info">
                    <h3>Elden Ring</h3>
                    <p class="price">5 490 ₽</p>
                </div>
                <button class="add-btn">+</button>
            </div>

            <!-- Block 6 -->
            <div class="block fade-in-delay-6">
                <div class="block-visual ps-extra-gradient">
                    <div class="ps-logo">PS+</div>
                    <span>Extra</span>
                </div>
                <div class="block-info">
                    <h3>PS Plus Extra</h3>
                    <p class="price">9 490 ₽</p>
                </div>
                <button class="add-btn">+</button>
            </div>
        </section>

        <footer class="minimal-footer fade-in">
            <p>Выбрано товаров: <span id="cart-count">0</span></p>
        </footer>
    </main>

    <script>
        let count = 0;
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                count++;
                document.getElementById('cart-count').textContent = count;
                btn.classList.add('active');
                btn.textContent = '✓';
                setTimeout(() => {
                    btn.classList.remove('active');
                    btn.textContent = '+';
                }, 1000);
            });
        });
    </script>
</body>
</html>
