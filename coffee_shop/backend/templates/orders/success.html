{% extends 'base.html' %}

{% block title %}Заказ оформлен — Почему нет?{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="success-state">
            <div class="success-icon">✅</div>
            <h1>Заказ #{{ order.pk }} оформлен!</h1>
            <p>Спасибо за заказ на сумму <span class="accent">{{ order.total_price }} ₽</span></p>
            <p>Статус: {{ order.get_status_display }}</p>
            <div class="success-buttons">
                <a href="{% url 'menu' %}" class="btn btn-primary">Вернуться в меню</a>
                <a href="{% url 'profile' %}" class="btn btn-outline">Мои заказы</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
