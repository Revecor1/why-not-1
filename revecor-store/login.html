<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Revecor Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Назад в магазин
        </a>

        <div class="auth-card fade-in">
            <div class="auth-header">
                <img src="/logo.jpg" alt="Revecor Store" class="auth-logo">
                <h1>Добро пожаловать</h1>
                <p>Войдите в свой аккаунт, чтобы продолжить покупки</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="example@mail.ru" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Запомнить меня
                    </label>
                    <a href="#" class="forgot-link">Забыли пароль?</a>
                </div>
                <button type="submit" class="btn btn-featured btn-full">Войти</button>
            </form>

            <div class="auth-divider">
                <span>или войдите через</span>
            </div>

            <div class="social-login">
                <button class="btn btn-social">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" width="20">
                    Google
                </button>
                <button class="btn btn-social">
                    <img src="https://telegram.org/img/t_logo.png" alt="Telegram" width="20">
                    Telegram
                </button>
            </div>

            <div class="auth-footer">
                Нет аккаунта? <a href="#" id="toggle-auth">Создать профиль</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Это демо-версия макета. Авторизация пока не подключена.');
        });
    </script>
</body>
</html>
