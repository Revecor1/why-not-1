<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости | Почему Нет?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: { 50: '#fcfaf8', 100: '#f5f0e8', 200: '#e8dbce', 300: '#d7c0ae', 400: '#c29d84', 500: '#ab7e60', 600: '#946247', 700: '#7a4e3a', 800: '#6b4e3d', 900: '#3e2a21', 950: '#1a120e' },
                        terracotta: { DEFAULT: '#d9774f', 500: '#d9774f', 600: '#c5613a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-coffee-50 text-coffee-900 selection:bg-terracotta selection:text-white flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <header class="pt-40 pb-20 bg-coffee-100 flex items-center justify-center text-center px-6">
        <div>
            <span class="text-terracotta font-bold uppercase tracking-[0.3em] text-xs mb-4 block">Акции и события</span>
            <h1 class="text-5xl md:text-7xl font-serif font-bold text-coffee-900 mb-4">Новости</h1>
            <p class="text-coffee-500 max-w-xl mx-auto">Свежие акции и специальные предложения нашей кофейни.</p>
        </div>
    </header>

    <main class="py-24 bg-white flex-grow">
        <div id="news-list" class="max-w-4xl mx-auto px-6 lg:px-12 space-y-12">
            <p class="text-center text-coffee-400 py-16">Загрузка новостей...</p>
        </div>
    </main>

    <div id="cart-placeholder"></div>

    <div id="toast-container" class="fixed bottom-6 right-6 flex flex-col gap-3 z-[10000]"></div>

    <div id="footer-placeholder"></div>
    <div id="chat-placeholder"></div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script src="js/news.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
