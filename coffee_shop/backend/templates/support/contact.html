{% extends 'base.html' %}
{% block title %}Поддержка — Почему нет?{% endblock %}
{% block content %}
<div class="container py-lg">
    <div class="support-header text-center">
        <h2>Служба поддержки ☕️</h2>
        <p class="text-muted">Есть вопросы или пожелания? Мы всегда на связи!</p>
    </div>
    
    <div class="support-form card p-lg mt-md mx-auto" style="max-width: 600px;">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group mb-md">
                <label for="name">Ваше имя:</label>
                <input type="text" name="name" id="name" class="form-control" required placeholder="Никита">
            </div>
            <div class="form-group mb-md">
                <label for="email">Ваш Email:</label>
                <input type="email" name="email" id="email" class="form-control" required placeholder="user@mail.ru">
            </div>
            <div class="form-group mb-md">
                <label for="message">Сообщение:</label>
                <textarea name="message" id="message" class="form-control" rows="3" required placeholder="Как забронировать столик?"></textarea>
            </div>
            <div class="form-group mb-md">
                <label for="attachment">Прикрепить файл (макс. 5МБ):</label>
                <input type="file" name="attachment" id="attachment" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Отправить сообщение</button>
        </form>
    </div>
</div>
{% endblock %}
